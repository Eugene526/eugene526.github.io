<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>關於我</title>
  <style>
    /* 导入 Google Fonts */
    @import url(https://fonts.googleapis.com/css?family=Roboto:400,300,600,400italic);
    body {
      font-family: 'Roboto', sans-serif;
      color: #333;
      margin: 0;
      padding: 0;
    }
    /* 背景图 */
    .background-image {
      background: url('https://images.unsplash.com/photo-1488866022504-f2584929ca5f?q=80&w=2662&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D') center/cover no-repeat;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      text-align: center;
      position: relative;
    }
    /* 头像样式 */
    .profile-picture {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      overflow: hidden;
      margin-bottom: 20px;
      border: 4px solid #fff;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
    }
    .profile-picture img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    /* 标题样式 */
    h1 {
      font-size: 36px;
      margin: 0;
      padding: 0;
      margin-bottom: 10px;
      color: #fff;
    }
    /* 子标题样式 */
    h2 {
      font-size: 24px;
      margin: 0;
      padding: 0;
      margin-bottom: 20px;
      color: #fff;
    }
    /* 主要按钮样式 */
    .btn {
      padding: 15px 30px;
      font-size: 20px;
      text-decoration: none;
      color: #fff;
      background-color: #007bff;
      border: none;
      border-radius: 5px;
      transition: background-color 0.3s ease, color 0.3s ease;
      box-shadow: 0px 8px 15px rgba(0, 0, 0, 0.1);
    }
    .btn:hover {
      background-color: #0056b3;
    }
    /* 下拉菜单样式 */
    .dropdown {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 999;
    }
    .dropdown select {
      padding: 8px;
      font-size: 16px;
    }
    /* 教程链接容器样式 */
    .links-container {
      display: none;
      justify-content: center;
      margin-top: 20px;
    }
    /* 教程链接样式 */
    .links-container a {
      display: block;
      margin-bottom: 10px;
    }
    /* 弹出窗口样式 */
    .popup {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background-color: white;
      padding: 20px;
      border: 1px solid #ccc;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      z-index: 9999;
    }
    /* 星星样式 */
    .star {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      pointer-events: none;
      animation: star-fall 1s linear;
    }
    /* 漸變效果 */
    .gradient-effect {
      transition: background-color 0.5s ease;
    }
    /* Star fall 动画 */
    @keyframes star-fall {
      0% {
        transform: translateY(0) rotate(0deg);
      }
      100% {
        transform: translateY(-100vh) rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div class="background-image">
    <!-- 头像 -->
    <div class="profile-picture">
      <img src="https://github.com/Eugene526/eugene526.github.io/blob/main/maxresdefault.jpg?raw=true" alt="Profile Picture">
    </div>
    <!-- 标题 -->
    <h1>Eugenechan | Eugene</h1>
    <!-- 子标题 -->
    <h2>一位 Discord Bot 开发者，也是一位学生</h2>
    <!-- 学过的编程语言 -->
    <h2><font color='#AED6F1'>学过的编程语言: Python、HTML、JavaScript</font></h2>
    <!-- 下拉菜单 -->
    <div class="dropdown">
      <select onchange="toggleLinks()">
        <option value="hideLinks">选择操作</option>
        <option value="showLinks">显示所有教程文档</option>
      </select>
    </div>
    <!-- 教程链接容器 -->
    <div class="links-container" id="linksContainer">
      <a href="#home" class="btn">Home</a>
      <a href="bot.html" class="btn" target="_blank">Discord Bot 教程</a>
      <a href="bot_reply.html" class="btn" target="_blank">Discord Bot 进阶教程-回复消息</a>
      <a href="python1.html" class="btn" target="_blank">Python 基础教程-变量</a>
    </div>
    <!-- 访问计数 -->
    <div id="visitCount" class="visit-count gradient-effect" style="position: fixed; top: 10px; right: 10px; color: #fff;"></div>
  </div>
  <!-- 弹出窗口 -->
  <div class="popup" id="tagPopup">
    <h2>所有标签</h2>
    <ul id="tagList"></ul>
    <button onclick="hideTags()" class="btn">关闭</button>
  </div>

  <script>
    // JavaScript 函数用于显示所有标签
    function showTags() {
      // 获取所有标签
      var tags = document.querySelectorAll('a.nav-link');
      var tagList = document.getElementById('tagList');

      // 清空标签列表
      tagList.innerHTML = '';

      // 将每个标签添加到列表中
      tags.forEach(function(tag) {
        var li = document.createElement('li');
        li.textContent = tag.textContent;
        tagList.appendChild(li);
      });

      // 显示弹出窗口
      document.getElementById('tagPopup').style.display = 'block';
    }

    // JavaScript 函数用于隐藏弹出窗口
    function hideTags() {
      document.getElementById('tagPopup').style.display = 'none';
    }

    // JavaScript 函数用于切换教程链接的显示和隐藏
    function toggleLinks() {
      var linksContainer = document.getElementById('linksContainer');
      var dropdown = document.querySelector('select');
      if (dropdown.value === 'showLinks') {
        linksContainer.style.display = 'flex';
      } else {
        linksContainer.style.display = 'none';
      }
    }

    // JavaScript 函数用于更新访问计数
    function updateVisitCount() {
      if (!localStorage.getItem('visitCount')) {
        localStorage.setItem('visitCount', 1);
      } else {
        let count = parseInt(localStorage.getItem('visitCount'));
        count++;
        localStorage.setItem('visitCount', count);
      }
      const visitCount = localStorage.getItem('visitCount');
      const visitCountContainer = document.getElementById('visitCount');
      if (visitCountContainer) {
        visitCountContainer.textContent = `访问次数：${visitCount}`;
      }
    }

    // JavaScript 函数用于在点击网页的任何位置后产生随机颜色的小星星
    document.addEventListener("click", function(event) {
      var star = document.createElement("div");
      star.classList.add("star");
      star.style.left = (event.clientX - 5) + "px";
      star.style.top = (event.clientY - 5) + "px";
      star.style.backgroundColor = randomColor();
      document.body.appendChild(star);
      setTimeout(function() {
        star.remove();
      }, 1000);
    });

    // 随机颜色函数
    function randomColor() {
      var letters = '0123456789ABCDEF';
      var color = '#';
      for (var i = 0; i < 6; i++) {
        color += letters[Math.floor(Math.random() * 16)];
      }
      return color;
    }
  </script>
</body>

</html>
