<!DOCTYPE html>
<html lang="en">

<head>
  <!-- Add this in the <head> section of your HTML -->
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="https://github.com/Eugene526/eugene526.github.io/blob/main/maxresdefault.jpg?raw=true">
  <title>關於我</title>
  <style>
    @import url(https://fonts.googleapis.com/earlyaccess/notosanstc.css);
    
    body {
      font-family: 'Noto Sans TC', '黑體-繁','微軟正黑體',  sans-serif !important;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      background: url('https://images.unsplash.com/photo-1488866022504-f2584929ca5f?q=80&w=2662&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D') center/cover no-repeat;
      color: #333;
    }

    .container {
      min-height: 100vh;
      overflow-y: auto;
      padding: 20px;
      box-shadow: 0px 0px 20px rgba(0, 0, 0, 0.1);
      transition: background-color 0.5s ease; /* 添加這一行 */
    }

    .section {
      padding: 100px 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: opacity 0.5s ease;
    }

    .section.fade-in {
      opacity: 1;
    }

    .link-button {
      margin-bottom: 20px;
      padding: 15px 30px;
      font-size: 20px;
      text-decoration: none;
      color: #fff;
      background-color: #007bff;
      border: none;
      border-radius: 5px;
      transition: background-color 0.3s ease, color 0.3s ease;
      box-shadow: 0px 8px 15px rgba(0, 0, 0, 0.1);
    }

    .link-button:hover {
      background-color: #0056b3;
    }

    .website-link {
      padding: 10px;
      font-size: 20px;
      text-decoration: none;
      color: #333;
    }

    .popup {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background-color: white;
      padding: 20px;
      border: 1px solid #ccc;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      z-index: 9999;
    }

    #dropdown {
      margin-bottom: 20px;
      font-size: 16px;
      padding: 8px;
    }

    .star {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      pointer-events: none;
      animation: star-fall 1s linear;
    }

    .profile-picture {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      overflow: hidden;
    }

    .profile-picture img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    @keyframes star-fall {
      0% {
        transform: translateY(0) rotate(0deg);
      }

      100% {
        transform: translateY(-100vh) rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div class="container"> <!-- 這裡加了容器 -->
    <select id="dropdown" onchange="showLinks()">
      <option value="hideLinks">選擇操作</option>
      <option value="showLinks">顯示所有連結</option>
    </select>

    <div id="linksContainer" style="display: none;">
      <nav>
        <ul>
          <li><a href="#home" style="color: #007bff;">Home</a></li>
          <li><a href="#section1" style="color: #007bff;">機器人資訊</a></li>
          <li><a href="#section2" style="color: #007bff;">邀請網址</a></li>
          <li><a href="#section3" style="color: #007bff;">伺服器</a></li>
          <li><a href="bot.html" target="_blank" style="color: #007bff;">Discordbot教學</a></li>
          <li><a href="bot_reply.html" target="_blank" style="color: #007bff;">Discordbot進階教學-回覆訊息</a></li>
          <li><a href="python1.html" target="_blank" style="color: #007bff;">Python基礎教學-變數</a></li>
        </ul>
      </nav>
    </div>

    <div id="visitCount" class="website-link" style="position: fixed; top: 10px; right: 10px; color: #007bff;"></div>

    <div id="home" class="section">
      <div class="profile-picture">
        <img src="https://github.com/Eugene526/eugene526.github.io/blob/main/maxresdefault.jpg?raw=true">
      </div>
      <h1 id="introText" style="color: #007bff;">Eugenechan | Eugene</h1>
      <h1 id="introText" style="color: #007bff;">一位discordbot開發者，也是一位學生</h1>
      <h1><font color='#AED6F1'>學過的程式語言: Python、html、javascript</font></h1>
    </div>

    <div id="section1" class="section">
      <a href="https://discordservers.tw/bots/1178651569173041193" class="btn btn-primary btn-lg">我的discord機器人詳細資訊</a>
    </div>

    <div id="section2" class="section">
      <a href="https://discord.com/oauth2/authorize?client_id=%201178651569173041193&permissions=8&scope=bot" class="btn btn-success btn-lg">我的discord機器人邀請網址</a>
    </div>

    <div id="section3" class="section">
      <a href="https://discord.gg/4VCWZBgrDr" class="btn btn-danger btn-lg">我的discord伺服器</a>
    </div>

    <div id="tagPopup" class="popup">
      <h2>所有標籤</h2>
      <ul id="tagList"></ul>
      <button onclick="hideTags()" style="margin-top: 10px; padding: 8px 16px; font-size: 16px; background-color: #007bff; border: none; border-radius: 5px; color: #fff;">關閉</button>
    </div>
  </div>

  <div class="popup-btn" onclick="showTags()"></div>

  <script>
    // JavaScript 函數用於顯示所有標籤
    function showTags() {
      var tags = document.querySelectorAll('ul.navbar-nav li a');
      var tagList = document.getElementById('tagList');

      tagList.innerHTML = '';

      tags.forEach(function(tag) {
        var li = document.createElement('li');
        li.textContent = tag.textContent;
        tagList.appendChild(li);
      });

      document.getElementById('tagPopup').style.display = 'block';
    }

    // JavaScript 函數用於隱藏彈出視窗
    function hideTags() {
      document.getElementById('tagPopup').style.display = 'none';
    }
  </script>

  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>

</html>
