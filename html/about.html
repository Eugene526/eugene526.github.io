<!DOCTYPE html>
<html lang="en">

<head>
  <!-- Add this in the <head> section of your HTML -->
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="https://github.com/Eugene526/eugene526.github.io/blob/main/maxresdefault.jpg?raw=true">
  <title>關於我</title>
  <style>
    @import url(https://fonts.googleapis.com/earlyaccess/notosanstc.css);
    body {
      font-family: 'Noto Sans TC', '黑體-繁','微軟正黑體',  sans-serif !important;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      background: url('https://images.unsplash.com/photo-1488866022504-f2584929ca5f?q=80&w=2662&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D') center/cover no-repeat;
      color: #333;
    }

    .container {
      min-height: 100vh;
      overflow-y: auto;
      padding: 20px;
      box-shadow: 0px 0px 20px rgba(0, 0, 0, 0.1);
    }

    .section {
      padding: 100px 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: opacity 0.5s ease;
    }

    .section.fade-in {
      opacity: 1;
    }

    .link-button {
      margin-bottom: 20px;
      padding: 15px 30px;
      font-size: 20px;
      text-decoration: none;
      color: #fff;
      background-color: #007bff;
      border: none;
      border-radius: 5px;
      transition: background-color 0.3s ease, color 0.3s ease;
      box-shadow: 0px 8px 15px rgba(0, 0, 0, 0.1);
    }

    .link-button:hover {
      background-color: #0056b3;
    }

    .website-link {
      padding: 10px;
      font-size: 20px;
      text-decoration: none;
      color: #333;
    }

    /* 定義漸變效果的 CSS 類 */
    .gradient-effect {
      transition: background-color 0.5s ease;
    }

    /* 定義圓形外框樣式 */
    .profile-picture {
      width: 150px; /* 調整圖片寬度 */
      height: 150px; /* 調整圖片高度 */
      border-radius: 50%; /* 將邊框設置為圓形 */
      overflow: hidden; /* 使圖片在圓形邊框內 */
    }

    .profile-picture img {
      width: 100%; /* 使圖片填滿其容器 */
      height: 100%; /* 使圖片填滿其容器 */
      object-fit: cover; /* 確保圖片完全填滿容器 */
    }
  </style>
</head>

<body>
  <div class="container">
    <!-- Your HTML content here -->

    <!-- Visit Count Display -->
    <div id="visitCount" class="website-link" style="position: fixed; top: 10px; right: 10px; color: #007bff;"></div>

    <!-- Home Section -->
    <div id="home" class="section" data-aos="fade-up" data-aos-easing="linear" data-aos-duration="1000">
      <div class="profile-picture" data-aos="fade-up" data-aos-easing="linear" data-aos-duration="1000">
        <img src="https://github.com/Eugene526/eugene526.github.io/blob/main/maxresdefault.jpg?raw=true">
      </div>
      <h1 id="introText" style="color: #007bff;">Eugenechan | Eugene</h1>
      <h1 id="introText" style="color: #007bff;">一位discordbot開發者，也是一位學生</h1>
      <h1><font color='#AED6F1'>學過的程式語言: Python、html、javascript</font></h1>
    </div>

    <!-- Section 1 -->
    <div id="section1" class="section" data-aos="fade-up" data-aos-easing="linear" data-aos-duration="1000">
      <a href="https://discordservers.tw/bots/1178651569173041193" class="btn btn-primary btn-lg">我的discord機器人詳細資訊</a>
    </div>

    <!-- Section 2 -->
    <div id="section2" class="section" data-aos="fade-up" data-aos-easing="linear" data-aos-duration="1000">
      <a href="https://discord.com/oauth2/authorize?client_id=%201178651569173041193&permissions=8&scope=bot" class="btn btn-success btn-lg">我的discord機器人邀請網址</a>
    </div>

    <!-- Section 3 -->
    <div id="section3" class="section" data-aos="fade-up" data-aos-easing="linear" data-aos-duration="1000">
      <a href="https://discord.gg/4VCWZBgrDr" class="btn btn-danger btn-lg">我的discord伺服器</a>
    </div>

    <!-- Add this before the closing </body> tag -->
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
      // AOS初始化
      AOS.init();

      // 當文檔載入完成時觸發AOS特效
      document.addEventListener('DOMContentLoaded', function() {
        AOS.refresh();
      });

      // 當向下滑動時觸發AOS特效
      document.addEventListener("scroll", function() {
        var scrollPosition = window.scrollY;
        var sections = document.querySelectorAll('.section');
        sections.forEach(function(section) {
          var offsetTop = section.offsetTop;
          if (scrollPosition > offsetTop - window.innerHeight * 0.8) {
            section.classList.add('fade-in');
          }
        });
      });
    </script>
  </div>
</body>

</html>
